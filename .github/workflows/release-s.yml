name: release-s

# Signs a release AAB and publishes it as a Release asset in a SEPARATE PRIVATE repo.
# Triggers are restricted to manual dispatch and version tags ONLY — never pull_request —
# so the signing keystore and the cross-repo PAT are never exposed to untrusted fork PRs.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create in the private repo (e.g. v1.0.0)"
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"

      - name: Build release bundle
        env:
          RELEASE_STORE_FILE: ${{ runner.temp }}/release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          GOOGLE_OAUTH_SERVER_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_SERVER_CLIENT_ID }}
        run: ./gradlew :androidApp:bundleRelease --no-configuration-cache

      - name: Publish AAB to private repo release
        uses: softprops/action-gh-release@v2
        with:
          repository: Davidvster/moneym-artefacts
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: androidApp/build/outputs/bundle/release/*.aab
